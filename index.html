<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to Portfolio…</title>

  <!-- Fallback redirect for users without JS -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=/portfolio/" />
  </noscript>

  <link rel="canonical" href="https://dukocuk.github.io/portfolio/" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #05060a;
      --accent: #7c5cff;
      --accent-2: #19e3c9;
      --text: #e8ecff;
      --muted: #8a90b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    canvas#starfield {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 24px;
    }

    /* Animated aurora glow behind content */
    .aurora {
      position: fixed;
      inset: -20%;
      z-index: 1;
      background:
        radial-gradient(40% 40% at 30% 30%, rgba(124, 92, 255, 0.28), transparent 70%),
        radial-gradient(45% 45% at 70% 60%, rgba(25, 227, 201, 0.20), transparent 70%),
        radial-gradient(35% 35% at 50% 85%, rgba(255, 92, 168, 0.18), transparent 70%);
      filter: blur(40px);
      animation: drift 16s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes drift {
      0%   { transform: translate3d(-3%, -2%, 0) scale(1.05); }
      50%  { transform: translate3d(2%, 3%, 0) scale(1.12); }
      100% { transform: translate3d(3%, -3%, 0) scale(1.05); }
    }

    .badge {
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent-2);
      border: 1px solid rgba(25, 227, 201, 0.35);
      border-radius: 999px;
      padding: 8px 16px;
      margin-bottom: 28px;
      background: rgba(25, 227, 201, 0.06);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }

    h1 .grad {
      background: linear-gradient(100deg, var(--accent) 0%, var(--accent-2) 60%, #ff5ca8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sub {
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.25rem);
      max-width: 540px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .ring-wrap {
      position: relative;
      width: 132px;
      height: 132px;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.55s;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-bg { stroke: rgba(255, 255, 255, 0.08); }

    .ring-fg {
      stroke: url(#ringGrad);
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 8px rgba(124, 92, 255, 0.6));
    }

    .count {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "JetBrains Mono", monospace;
      font-size: 2.6rem;
      font-weight: 500;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.7s;
    }

    .btn {
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 500;
      padding: 14px 28px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .btn-primary {
      color: #07070d;
      background: linear-gradient(100deg, var(--accent) 0%, var(--accent-2) 100%);
      box-shadow: 0 8px 30px rgba(124, 92, 255, 0.35);
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 40px rgba(124, 92, 255, 0.5); }

    .btn-ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.14);
    }
    .btn-ghost:hover { transform: translateY(-2px); background: rgba(255, 255, 255, 0.08); }

    .btn .arrow { transition: transform 0.18s ease; }
    .btn-primary:hover .arrow { transform: translateX(4px); }

    .paused-note {
      margin-top: 22px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .aurora { animation: none; }
      .badge, h1, .sub, .ring-wrap, .actions { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <canvas id="starfield"></canvas>

  <div class="stage">
    <span class="badge">Duran Köse · Portfolio</span>
    <h1>
      Taking you to my<br />
      <span class="grad">work &amp; projects</span>
    </h1>
    <p class="sub">
      This page lives at the front door. The good stuff is one short hop away —
      you'll land there automatically.
    </p>

    <div class="ring-wrap">
      <svg width="132" height="132" viewBox="0 0 132 132">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c5cff" />
            <stop offset="60%" stop-color="#19e3c9" />
            <stop offset="100%" stop-color="#ff5ca8" />
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="66" cy="66" r="58" fill="none" stroke-width="6" />
        <circle id="ringFg" class="ring-fg" cx="66" cy="66" r="58" fill="none" stroke-width="6" />
      </svg>
      <div class="count" id="count">5</div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" id="enterBtn" href="/portfolio/">
        Enter now <span class="arrow">→</span>
      </a>
      <button class="btn btn-ghost" id="stayBtn">Stay here</button>
    </div>

    <div class="paused-note" id="note">Redirecting in 5s…</div>
  </div>

  <!-- Countdown + redirect (vanilla JS — no React/Babel needed) -->
  <script>
    (function () {
      var DEST = "/portfolio/";
      var TOTAL = 5;
      var remaining = TOTAL;
      var paused = false;
      var timer = null;

      var R = 58;
      var C = 2 * Math.PI * R;
      var ringFg = document.getElementById("ringFg");
      var countEl = document.getElementById("count");
      var noteEl = document.getElementById("note");
      var stayBtn = document.getElementById("stayBtn");

      ringFg.setAttribute("stroke-dasharray", C);

      function render() {
        var n = Math.max(remaining, 0);
        var progress = n / TOTAL;
        ringFg.setAttribute("stroke-dashoffset", C * (1 - progress));
        countEl.textContent = n;
        noteEl.textContent = paused
          ? "Auto-redirect paused — press “Enter now” when ready."
          : "Redirecting in " + n + "s…";
        stayBtn.textContent = paused ? "Resume redirect" : "Stay here";
      }

      function go() { window.location.href = DEST; }

      function tick() {
        if (paused) return;
        if (remaining <= 0) { go(); return; }
        timer = setTimeout(function () {
          remaining -= 1;
          render();
          tick();
        }, 1000);
      }

      stayBtn.addEventListener("click", function () {
        paused = !paused;
        render();
        if (!paused) tick();
      });

      // Pause the auto-redirect if the user shows intent to stay/interact.
      window.addEventListener("keydown", function () {
        if (!paused) { paused = true; render(); }
      }, { once: true });

      render();
      tick();
    })();
  </script>

  <!-- Lightweight animated starfield (vanilla canvas) -->
  <script>
    (function () {
      var canvas = document.getElementById("starfield");
      var ctx = canvas.getContext("2d");
      var reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      var w, h, stars, raf;

      function resize() {
        w = canvas.width = window.innerWidth * devicePixelRatio;
        h = canvas.height = window.innerHeight * devicePixelRatio;
        var count = Math.min(220, Math.floor((window.innerWidth * window.innerHeight) / 9000));
        stars = Array.from({ length: count }, function () {
          return {
            x: Math.random() * w,
            y: Math.random() * h,
            z: Math.random() * 0.8 + 0.2,
            r: Math.random() * 1.4 + 0.3,
          };
        });
      }

      function tick() {
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < stars.length; i++) {
          var s = stars[i];
          s.y += s.z * 0.35 * devicePixelRatio;
          if (s.y > h) { s.y = 0; s.x = Math.random() * w; }
          var tw = 0.5 + Math.random() * 0.5;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r * devicePixelRatio, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(180, 200, 255, " + (0.25 + s.z * 0.5 * tw) + ")";
          ctx.fill();
        }
        raf = requestAnimationFrame(tick);
      }

      resize();
      window.addEventListener("resize", resize);
      tick();
      if (reduce) cancelAnimationFrame(raf); // draw a single static frame
    })();
  </script>
</body>
</html>
